<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <meta
      name="description"
      content="ITパスポート試験のための、ミニマルな用語集とクイズ"
    />
    <title>ITパスポート 学習</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <button id="home-btn" type="button" class="site-title">
          IT Passport
        </button>
        <nav class="site-nav" aria-label="主要ナビゲーション">
          <button id="nav-terms-btn" type="button" class="nav-link">
            用語集
          </button>
          <button id="nav-quiz-btn" type="button" class="nav-link">
            クイズ
          </button>
        </nav>
      </div>
    </header>

    <main>
      <!-- 用語一覧画面 -->
      <section id="screen-terms" class="screen">
        <header class="page-header">
          <p class="eyebrow">IT Passport</p>
          <h1>重要用語</h1>
          <p class="lede">
            試験で繰り返し問われる基本用語を、分野を越えて整理しました。ひとつずつ静かに読み進めてください。
          </p>
        </header>

        <dl id="terms-list" class="terms"></dl>

        <div class="actions">
          <button id="start-btn" type="button" class="btn-primary">
            学習を開始する
          </button>
        </div>
      </section>

      <!-- クイズ画面 -->
      <section id="screen-quiz" class="screen" hidden>
        <button id="quiz-back-btn" type="button" class="back-link">
          ← 用語集に戻る
        </button>

        <header class="quiz-header">
          <p class="eyebrow" id="quiz-category">テクノロジ</p>
          <p class="progress" id="quiz-progress">1 / 10</p>
        </header>

        <h2 id="quiz-question" class="question"></h2>
        <p id="quiz-year" class="caption"></p>

        <div id="quiz-choices" class="choices"></div>

        <div id="quiz-feedback" class="feedback" hidden>
          <p class="feedback-label" id="feedback-label"></p>
          <p class="feedback-body" id="feedback-explanation"></p>
        </div>

        <div class="actions">
          <button id="next-btn" type="button" class="btn-primary" disabled>
            次へ
          </button>
        </div>
      </section>

      <!-- 結果画面 -->
      <section id="screen-result" class="screen" hidden>
        <header class="page-header">
          <p class="eyebrow">Result</p>
          <h1>お疲れさまでした</h1>
        </header>

        <div class="result">
          <p class="result-score">
            <span id="result-score">0</span>
            <span class="result-total"> / <span id="result-total">10</span></span>
          </p>
          <p id="result-message" class="lede"></p>
        </div>

        <div class="actions actions-row">
          <button id="restart-btn" type="button" class="btn-primary">
            もう一度
          </button>
          <button id="back-to-terms-btn" type="button" class="btn-ghost">
            用語集に戻る
          </button>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer-inner">
        <p>ITパスポート 学習</p>
        <div class="footer-nav">
          <button id="footer-terms-btn" type="button" class="footer-link">
            用語集
          </button>
          <button id="to-top-btn" type="button" class="footer-link">
            ↑ 上部へ
          </button>
        </div>
      </div>
    </footer>
  </body>
</html>
